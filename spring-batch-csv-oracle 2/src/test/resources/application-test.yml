spring:
  application:
    name: csv-to-oracle-batch-test

  # Use H2 for both batch metadata and business data in tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  h2:
    console:
      enabled: false

batch:
  input:
    file: classpath:data/input.csv
  chunk-size: 10
  skip-limit: 5

logging:
  level:
    org.springframework.batch: DEBUG
    com.example.batch: DEBUG
